<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Omar Rosas — Asesor de Arrendamiento</title>
  <meta name="description" content="Contacto directo con Omar Rosas, asesor especializado en arrendamiento de vehículos premium en México.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080809;
      --s1:      #0E0E10;
      --s2:      #141416;
      --border:  #1F1F23;
      --gold:    #C8A96E;
      --gold-lt: #E8D5A3;
      --gold-dk: #7A6030;
      --white:   #F2F0EB;
      --muted:   #7E7E86;
      --muted2:  #42424A;
    }

    html {
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      color: var(--white);
      background: var(--bg);
      min-height: 100svh;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain overlay — identical to index.html */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 250px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Wrapper (card on desktop) ── */
    .wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Photo zone ── */
    .photo-zone {
      position: relative;
      width: 100%;
      height: 62vh;
      min-height: 360px;
      overflow: hidden;
    }

    .photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* Bottom gradient: photo fades into bg */
    .photo-zone::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 85%);
      pointer-events: none;
    }

    /* Name overlaid on the gradient area */
    .name-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 1.5rem 1.4rem;
      z-index: 2;
    }

    .name-overlay h1 {
      font-family: 'Cormorant Garant', serif;
      font-weight: 400;
      font-size: clamp(3.6rem, 16vw, 5.6rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .name-overlay h1 em {
      font-style: italic;
      color: var(--gold);
      display: block;
    }

    /* ── Card zone ── */
    .card-zone {
      padding: 0 1.5rem 2.5rem;
    }

    /* Title row with flanking gold lines */
    .title-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.4rem 0 1.8rem;
    }

    .gold-line {
      flex: 1;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
    }

    .title-text {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Primary CTA — WhatsApp */
    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      padding: 1rem 1.5rem;
      background: var(--gold);
      color: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 0.65rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(200,169,110,0.3);
    }

    .btn-whatsapp:active { transform: translateY(0); box-shadow: none; }
    .btn-whatsapp:focus-visible { outline: 2px solid var(--gold-lt); outline-offset: 2px; }

    .btn-whatsapp svg {
      width: 16px;
      height: 16px;
      fill: var(--bg);
      flex-shrink: 0;
    }

    /* Secondary CTA — Save contact */
    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: transparent;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--border);
      cursor: pointer;
      margin-bottom: 2rem;
      transition: transform 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-save:hover {
      border-color: var(--gold);
      color: var(--gold-lt);
      transform: translateY(-1px);
    }

    .btn-save:active { transform: translateY(0); }
    .btn-save:focus-visible { outline: 1px solid var(--gold); outline-offset: 2px; }

    .btn-save svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    /* Contact rows */
    .contact-rows {
      border-top: 1px solid var(--border);
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--white);
      transition: color 0.2s;
    }

    .contact-row:hover { color: var(--gold-lt); }
    .contact-row:focus-visible { outline: 1px solid var(--gold); outline-offset: 2px; }

    .contact-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 13px;
      height: 13px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
    }

    .contact-label {
      display: block;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.12rem;
    }

    .contact-value {
      font-size: 0.88rem;
      font-weight: 400;
      color: inherit;
    }

    /* Footer */
    .footer {
      padding: 1.8rem 1.5rem 2.5rem;
      text-align: center;
    }

    .footer a {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--gold); }

    /* ── Load animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .photo-zone    { animation: fadeUp 1s   cubic-bezier(0.16,1,0.3,1) 0s    both; }
    .name-overlay  { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.12s both; }
    .title-row     { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.24s both; }
    .btn-whatsapp  { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.34s both; }
    .btn-save      { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.42s both; }
    .contact-rows  { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.5s  both; }
    .footer        { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.58s both; }

    /* ── Desktop: float as a card ── */
    @media (min-width: 640px) {
      body {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 3rem 1.5rem;
        min-height: 100svh;
      }

      .wrapper {
        border: 1px solid rgba(200,169,110,0.18);
        background: var(--s1);
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(0,0,0,0.6),
          0 24px 80px rgba(0,0,0,0.7),
          0 4px 20px rgba(200,169,110,0.08);
      }

      .photo-zone {
        height: 480px;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
